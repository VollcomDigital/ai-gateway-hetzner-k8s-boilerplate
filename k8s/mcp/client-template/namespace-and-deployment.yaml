apiVersion: v1
kind: Namespace
metadata:
  name: mcp-client-<CLIENT>
  labels:
    app.kubernetes.io/name: mcp-client
    app.kubernetes.io/part-of: ai-gateway
    ai-gateway.vollcom.io/client: <CLIENT>
---
# Placeholder MCP server — replace image and env with your actual MCP implementation.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-placeholder
  namespace: mcp-client-<CLIENT>
  labels:
    app: mcp-placeholder
    ai-gateway.vollcom.io/client: <CLIENT>
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-placeholder
  template:
    metadata:
      labels:
        app: mcp-placeholder
        ai-gateway.vollcom.io/client: <CLIENT>
    spec:
      containers:
        - name: mcp
          image: ghcr.io/modelcontextprotocol/servers:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - secretRef:
                name: mcp-client-<CLIENT>-credentials
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: mcp-placeholder
  namespace: mcp-client-<CLIENT>
spec:
  selector:
    app: mcp-placeholder
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
# EXAMPLE ONLY — create via External Secrets in production.
apiVersion: v1
kind: Secret
metadata:
  name: mcp-client-<CLIENT>-credentials
  namespace: mcp-client-<CLIENT>
type: Opaque
stringData:
  CLIENT_API_TOKEN: replace-me
