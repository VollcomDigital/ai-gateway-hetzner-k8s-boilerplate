apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: litellm-bootstrap-governance
  namespace: flux-system
spec:
  interval: 10m
  timeout: 10m
  wait: true
  prune: true
  dependsOn:
    - name: litellm
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  path: ./k8s/apps/litellm/bootstrap-governance
