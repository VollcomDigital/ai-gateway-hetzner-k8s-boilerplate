# External Secrets Operator templates — replace ClusterSecretStore name for your vault.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: litellm-provider-keys
  namespace: litellm
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: <SECRET_STORE>
  target:
    name: litellm-provider-keys
    creationPolicy: Owner
  data:
    - secretKey: OPENAI_API_KEY
      remoteRef:
        key: ai-gateway/provider-keys
        property: openai_api_key
    - secretKey: ANTHROPIC_API_KEY
      remoteRef:
        key: ai-gateway/provider-keys
        property: anthropic_api_key
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: litellm-db-secret
  namespace: litellm
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: <SECRET_STORE>
  target:
    name: litellm-db-secret
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: ai-gateway/litellm-db
        property: username
    - secretKey: password
      remoteRef:
        key: ai-gateway/litellm-db
        property: password
    - secretKey: database
      remoteRef:
        key: ai-gateway/litellm-db
        property: database
---
