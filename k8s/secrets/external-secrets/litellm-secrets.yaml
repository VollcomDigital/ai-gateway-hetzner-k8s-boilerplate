apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: litellm-observability-secrets
  namespace: litellm
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: <SECRET_STORE>
  target:
    name: litellm-observability-secrets
    creationPolicy: Owner
  data:
    - secretKey: LANGFUSE_PUBLIC_KEY
      remoteRef:
        key: ai-gateway/langfuse
        property: public_key
    - secretKey: LANGFUSE_SECRET_KEY
      remoteRef:
        key: ai-gateway/langfuse
        property: secret_key
