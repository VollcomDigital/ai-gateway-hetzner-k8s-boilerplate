apiVersion: v1
kind: ServiceAccount
metadata:
  name: litellm-postgres-backup
  namespace: litellm
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: litellm-postgres-backup
  namespace: litellm
  labels:
    app: litellm-postgres-backup
    app.kubernetes.io/part-of: ai-gateway
spec:
  schedule: "0 3 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 7
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        metadata:
          labels:
            app: litellm-postgres-backup
        spec:
          serviceAccountName: litellm-postgres-backup
          restartPolicy: OnFailure
          containers:
            - name: pg-dump
              image: postgres:16-alpine
              imagePullPolicy: IfNotPresent
              env:
                - name: PGHOST
                  value: litellm-postgres.litellm.svc.cluster.local
                - name: PGPORT
                  value: "5432"
                - name: PGUSER
                  valueFrom:
                    secretKeyRef:
                      name: litellm-db-secret
                      key: username
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: litellm-db-secret
                      key: password
                - name: PGDATABASE
                  valueFrom:
                    secretKeyRef:
                      name: litellm-db-secret
                      key: database
              command:
                - /bin/sh
                - -ec
                - |
                  set -euo pipefail
                  ts="$(date -u +%Y%m%dT%H%M%SZ)"
                  outfile="/backup/litellm-${ts}.sql.gz"
                  pg_dump --no-owner --no-acl | gzip > "${outfile}"
                  find /backup -name 'litellm-*.sql.gz' -mtime +14 -delete
                  echo "backup written: ${outfile}"
              volumeMounts:
                - name: backup-data
                  mountPath: /backup
          volumes:
            - name: backup-data
              persistentVolumeClaim:
                claimName: litellm-postgres-backup-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: litellm-postgres-backup-data
  namespace: litellm
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: hcloud-volumes
  resources:
    requests:
      storage: 20Gi
