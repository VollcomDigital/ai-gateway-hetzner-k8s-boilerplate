# EXAMPLE ONLY — create out-of-band or via External Secrets.
apiVersion: v1
kind: Secret
metadata:
  name: litellm-drain-token
  namespace: litellm
type: Opaque
stringData:
  token: replace-with-random-drain-token
---
# EXAMPLE ONLY — Langfuse keys optional until Langfuse is deployed.
apiVersion: v1
kind: Secret
metadata:
  name: litellm-observability-secrets
  namespace: litellm
type: Opaque
stringData:
  LANGFUSE_PUBLIC_KEY: replace-with-langfuse-public-key
  LANGFUSE_SECRET_KEY: replace-with-langfuse-secret-key
