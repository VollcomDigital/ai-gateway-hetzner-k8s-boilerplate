# ServiceMonitor requires Prometheus Operator CRDs in the cluster.
# Disable in overlays if your foundation stack does not ship prometheus-operator.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: litellm
  namespace: litellm
  labels:
    app.kubernetes.io/name: litellm
    app.kubernetes.io/part-of: ai-gateway
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: litellm
  namespaceSelector:
    matchNames:
      - litellm
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
      scrapeTimeout: 10s
