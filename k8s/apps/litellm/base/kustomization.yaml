apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - helmrepository.yaml
  - helmrelease.yaml
  - servicemonitor.yaml

configMapGenerator:
  - name: litellm-proxy-config
    namespace: litellm
    files:
      - proxy_server_config.yaml=config/proxy_server_config.yaml
    options:
      disableNameSuffixHash: true
