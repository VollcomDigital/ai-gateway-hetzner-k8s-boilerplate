apiVersion: v1
kind: ServiceAccount
metadata:
  name: litellm-bootstrap
  namespace: litellm
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-bootstrap-config
  namespace: litellm
data:
  governance.yaml: |
    teams:
      - team_alias: vollcom-internal
        max_budget: 500
        budget_duration: 30d
        models: [chat-default, code-default, reasoning-heavy, chat-cheap]
      - team_alias: automation
        max_budget: 200
        budget_duration: 30d
        models: [agent-default, chat-cheap]
    virtual_keys:
      - key_alias: cursor-prod
        team_alias: vollcom-internal
        models: [code-default]
        max_budget: 100
        budget_duration: 30d
      - key_alias: openwebui-internal
        team_alias: vollcom-internal
        models: [chat-default, chat-cheap]
        max_budget: 50
        budget_duration: 30d
      - key_alias: hermes-internal
        team_alias: vollcom-internal
        models: [chat-default, reasoning-heavy]
        max_budget: 75
        budget_duration: 30d
      - key_alias: n8n-automation
        team_alias: automation
        models: [agent-default]
        max_budget: 150
        budget_duration: 30d
    access_groups:
      - group_name: client-template-engagement
        models: [chat-default, agent-default]
        mcp_servers: [client-template-wordpress, client-template-repo]
---
apiVersion: batch/v1
kind: Job
metadata:
  name: litellm-bootstrap-governance
  namespace: litellm
  labels:
    app.kubernetes.io/name: litellm-bootstrap
    app.kubernetes.io/component: governance
spec:
  ttlSecondsAfterFinished: 86400
  backoffLimit: 6
  template:
    metadata:
      labels:
        app.kubernetes.io/name: litellm-bootstrap
    spec:
      serviceAccountName: litellm-bootstrap
      restartPolicy: OnFailure
      containers:
        - name: bootstrap
          image: python:3.12-slim
          imagePullPolicy: IfNotPresent
          env:
            - name: LITELLM_BASE_URL
              value: http://litellm.litellm.svc.cluster.local:4000
            - name: LITELLM_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-master-key
                  key: PROXY_MASTER_KEY
            - name: GOVERNANCE_CONFIG
              value: /config/governance.yaml
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://alloy.observability.svc.cluster.local:4317
            - name: OTEL_SERVICE_NAME
              value: litellm-bootstrap
          command:
            - /bin/sh
            - -ec
            - |
              pip install --no-cache-dir -q pyyaml httpx opentelemetry-api opentelemetry-sdk \
                opentelemetry-exporter-otlp-proto-http
              python /scripts/bootstrap_litellm_governance.py
          volumeMounts:
            - name: governance-config
              mountPath: /config
            - name: bootstrap-script
              mountPath: /scripts
      volumes:
        - name: governance-config
          configMap:
            name: litellm-bootstrap-config
        - name: bootstrap-script
          configMap:
            name: litellm-bootstrap-script
            defaultMode: 0555
